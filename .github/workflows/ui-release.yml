name: Release UI

on:
  push:
    branches:
      - main
    paths:
      - "ui/**"
      - ".github/workflows/ui-release.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: DropGoLine
  APP_VERSION: 0.1.0
  UI_JAR: dropgoline-ui-0.1.0-SNAPSHOT.jar

jobs:
  build-ui:
    name: Build UI (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            archive: DropGoLine-windows-runtime.zip
          - os: macos
            runner: macos-latest
            archive: DropGoLine-macos-runtime.zip
          - os: linux
            runner: ubuntu-latest
            archive: DropGoLine-linux-runtime.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify jpackage
        shell: bash
        run: jpackage --version

      - name: Install p2p module dependency
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -f p2p-sample/pom.xml -DskipTests "-Dmaven.repo.local=${RUNNER_TEMP}/m2" install

      - name: Build UI classpath
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -f ui/pom.xml \
            -DskipTests \
            "-Dmaven.repo.local=${RUNNER_TEMP}/m2" \
            package dependency:copy-dependencies \
            -DincludeScope=runtime \
            -DoutputDirectory="${GITHUB_WORKSPACE}/ui/target/release-work/deps"

      - name: Stage jpackage input
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ui/target/jpackage-input ui/target/jpackage-out
          mkdir -p ui/target/jpackage-input
          cp "ui/target/${UI_JAR}" ui/target/jpackage-input/
          cp ui/target/release-work/deps/*.jar ui/target/jpackage-input/

      - name: Package Windows UI with bundled runtime
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          jpackage `
            --type app-image `
            --name $env:APP_NAME `
            --app-version $env:APP_VERSION `
            --input "ui/target/jpackage-input" `
            --main-jar $env:UI_JAR `
            --main-class dropgoline.Launcher `
            --dest "ui/target/jpackage-out" `
            --win-console

          $appImage = "ui/target/jpackage-out/$env:APP_NAME"
          $debugCmdPath = "$appImage/DropGoLine-debug.cmd"
          @'
          @echo off
          cd /d "%~dp0"
          echo Starting DropGoLine debug launcher...
          echo.
          DropGoLine.exe
          set EXITCODE=%ERRORLEVEL%
          echo.
          echo DropGoLine exited with code %EXITCODE%
          pause
          exit /b %EXITCODE%
          '@ | Set-Content -Encoding ASCII $debugCmdPath

          tar -a -cf "ui/target/${{ matrix.archive }}" -C "ui/target/jpackage-out" $env:APP_NAME

      - name: Package macOS UI with bundled runtime
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          jpackage \
            --type app-image \
            --name "$APP_NAME" \
            --app-version "$APP_VERSION" \
            --input "ui/target/jpackage-input" \
            --main-jar "$UI_JAR" \
            --main-class dropgoline.Launcher \
            --dest "ui/target/jpackage-out" \
            --java-options "-XstartOnFirstThread"

          (cd ui/target/jpackage-out && zip -r "../${{ matrix.archive }}" "${APP_NAME}.app")

      - name: Package Linux UI with bundled runtime
        if: matrix.os == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          jpackage \
            --type app-image \
            --name "$APP_NAME" \
            --app-version "$APP_VERSION" \
            --input "ui/target/jpackage-input" \
            --main-jar "$UI_JAR" \
            --main-class dropgoline.Launcher \
            --dest "ui/target/jpackage-out"

          tar -czf "ui/target/${{ matrix.archive }}" -C ui/target/jpackage-out "$APP_NAME"

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropgoline-ui-${{ matrix.os }}
          path: ui/target/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish UI release
    runs-on: ubuntu-latest
    needs: build-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download UI artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          tag="ui-${short_sha}-${GITHUB_RUN_NUMBER}"

          gh release create "$tag" \
            release-assets/dropgoline-ui-windows/DropGoLine-windows-runtime.zip \
            release-assets/dropgoline-ui-macos/DropGoLine-macos-runtime.zip \
            release-assets/dropgoline-ui-linux/DropGoLine-linux-runtime.tar.gz \
            --target "$GITHUB_SHA" \
            --title "DropGoLine UI ${short_sha}" \
            --notes "DropGoLine UI builds from ${GITHUB_SHA}. Windows, macOS, and Linux assets include a bundled Java runtime."
